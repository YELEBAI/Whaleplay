name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build_mode: none
          - language: rust
            build_mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@2f90a82ab7eece7aa899ce5d384db49efd7337ea # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build_mode }}
          queries: security-extended

      - name: Install Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # pinned
        with:
          toolchain: "1.95.0"

      - name: Install Linux dependencies
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Build Rust database
        if: matrix.language == 'rust'
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked --all-targets

      - name: Analyze
        uses: github/codeql-action/analyze@2f90a82ab7eece7aa899ce5d384db49efd7337ea # v4
        with:
          category: /language:${{ matrix.language }}
